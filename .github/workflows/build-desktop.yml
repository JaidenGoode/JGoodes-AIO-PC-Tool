name: Build Desktop App (Windows .exe)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore NuGet packages
        working-directory: desktop
        run: dotnet restore

      - name: Publish — Self-contained folder
        working-directory: desktop
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -o ../publish/win-x64

      - name: Zip the publish folder
        run: |
          Compress-Archive -Path publish/win-x64/* -DestinationPath publish/JGoodeAIO-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JGoodeAIO-Windows
          path: publish/JGoodeAIO-Windows.zip
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "JGoode A.I.O PC Tool ${{ github.ref_name }}"
          body: |
            ## JGoode A.I.O PC Tool ${{ github.ref_name }}

            ### How to run
            1. Download `JGoodeAIO-Windows.zip` below
            2. Extract the zip anywhere (Desktop, C:\JGoodeAIO, etc.)
            3. Right-click `JGoodeAIO.exe` → **Run as administrator**

            > No .NET installation required — everything is included.

            ### What's included
            - 47 PowerShell system tweaks (privacy, performance, gaming, debloat)
            - Live CPU / RAM / GPU / Disk monitoring
            - System cleaner (temp files, DNS flush, network reset)
            - 13 accent colors + dark/light mode
            - GitHub settings sync
            - Self-contained — no .NET runtime required
          files: publish/JGoodeAIO-Windows.zip
          draft: false
          prerelease: false
